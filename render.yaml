services:
  - type: web
    name: ichikawa-shuro-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
